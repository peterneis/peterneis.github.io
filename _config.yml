# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Site Settings
locale                   : "en-US"
title                    : "Peter Neis"
title_separator          : "-"
name                     : "Peter Neis"
description              : "personal description"
url                      : "https://peterneis.github.io/"
baseurl                  : ""
repository               : "peterneis/peterneis.github.io"

# Analytics
analytics:
  provider               : "custom"
  google:
    tracking_id          : "G-PZKDFFZ2EM"

# Site Author
author:
  name             : "Peter Neis"
  avatar           : "profile.jpg"
  bio              : "Postdoctoral Researcher"
  location         : "CERDI"
  email            : "peter.neis@uca.fr"
  github           : "peterneis"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - Gemfile
  - LICENSE
  - README
  - Rakefile
  - assets/js/plugins
  - assets/js/vendor
  - config
  - log
  - tmp
  - vendor
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed


# Outputting
permalink: /:categories/:title/
timezone: Europe/Paris


# Plugins
plugins:
  - jekyll-paginate
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-gist
  - jekyll-feed


# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
